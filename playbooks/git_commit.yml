---
# Stub for IAG5 service: git-commit
# Replace with Bloomberg's actual playbook when available.
# Expected extra_vars: repo_path, commit_message
- name: "Stub: git-commit"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: false
  vars:
    repo_path: "{{ repo_path | default('/opt/itential/repo') }}"
    commit_message: "{{ commit_message | default('automated commit') }}"
  tasks:
    - name: git commit (stub)
      debug:
        msg: "STUB: git commit -m '{{ commit_message }}' in {{ repo_path }}"
    - name: set result
      set_fact:
        result: "{{ {'success': true, 'repo_path': repo_path, 'commit_sha': 'stub-sha-' + (999999 | random | string), 'message': commit_message} }}"
    - debug:
        var: result
