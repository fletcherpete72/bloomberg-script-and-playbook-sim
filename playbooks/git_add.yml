# Replace with Bloomberg's actual playbook when available.
# Expected extra_vars: repo_path, files (comma-sep or "." for all)
- name: "Stub: git-add"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: false
  vars:
    repo_path: "{{ repo_path | default('/opt/itential/repo') }}"
    files: "{{ files | default('.') }}"
  tasks:
    - name: git add (stub)
      debug:
        msg: "STUB: git add {{ files }} in {{ repo_path }}"
    - name: set result
      set_fact:
        result: "{{ {'success': true, 'repo_path': repo_path, 'files': files, 'staged': true} }}"
    - debug:
        var: result
